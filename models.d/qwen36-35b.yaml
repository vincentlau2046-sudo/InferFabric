name: qwen36-35b
description: "Qwen3.6-35B A3B MoE NVFP4 + Visual"
gpu_role: exclusive
model_type: vl
modality: text-vision
quantization: NVFP4

vllm:
  model_dir: Qwen3.6-35B-A3B-NVFP4
  served_name: vllm_qwen36_35b
  port: 8001
  conda_env: qwen36-35b-vllm
  max_model_len: 204800
  gpu_memory_utilization: 0.85
  max_num_seqs: 12
  kv_cache_dtype: fp8
  extra_flags: >-
    --max-num-batched-tokens 8192
    --moe-backend marlin
    --compilation-config '{"cudagraph_mode": "PIECEWISE", "cudagraph_capture_sizes": [1, 2, 4, 8, 16, 32]}'
    --enable-prefix-caching
    --enable-chunked-prefill
    --async-scheduling
    --enable-auto-tool-choice
    --tool-call-parser qwen3_xml
    --reasoning-parser qwen3
    --trust-remote-code
    --attention-backend flashinfer
    --kv-offloading-backend native
    --kv-offloading-size 16
