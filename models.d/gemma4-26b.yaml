name: gemma4-26b
description: "Gemma4-26B A4B NVFP4"
mode: exclusive
model_type: llm
quantization: NVFP4

vllm:
  model_dir: gemma-4-26b-a4b-nvfp4
  served_name: vllm_gemma26b_nvfp4
  port: 8001
  conda_env: gm4-26b-vllm
  max_model_len: 131072
  gpu_memory_utilization: 0.88
  max_num_seqs: 4
  kv_cache_dtype: fp8
  extra_flags: >-
    --moe-backend marlin
    --enable-chunked-prefill
    --max-num-batched-tokens 8192
    --reasoning-parser gemma4
    --trust-remote-code
