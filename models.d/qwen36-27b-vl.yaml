name: qwen36-27b-vl
description: "Qwen3.6-27B NVFP4 + MTP + Vision (Huihui abliterated)"
gpu_role: exclusive
model_type: vl
modality: text-vision
quantization: NVFP4
peak_vram_mb: 30500

vllm:
  model_dir: Huihui-Qwen3.6-27B-abliterated-NVFP4-MTP
  served_name: vllm_qwen27b_vl
  port: 8003
  conda_env: qwen36-27b-vllm-vl
  max_model_len: 131072
  gpu_memory_utilization: 0.86
  max_num_seqs: 8
  kv_cache_dtype: fp8
  speculative_config: '{"method": "mtp", "num_speculative_tokens": 2}'
  # prometheus metrics: requires vLLM >= 0.25 (add --prometheus-port 8004 when available)
  extra_flags: >-
    --max-num-batched-tokens 8192
    --enable-prefix-caching
    --compilation-config '{"cudagraph_mode": "PIECEWISE", "cudagraph_capture_sizes": [1, 2, 4, 8, 16, 32]}'
    --enable-chunked-prefill
    --async-scheduling
    --enable-auto-tool-choice
    --tool-call-parser qwen3_xml
    --reasoning-parser qwen3
    --trust-remote-code
    --attention-backend flashinfer
    --kv-offloading-backend native
    --kv-offloading-size 16
  startup_timeout: 240
